# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Continuous Integration
on: pull_request

env:
  # Set the DOTNET_SKIP_FIRST_TIME_EXPERIENCE environment variable to stop wasting time caching packages
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  # Disable sending usage data to Microsoft
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    name: Build
    if: "!contains(github.event.head_commit.message, 'skip-ci')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 'Get Git tags'
        run: git fetch --tags
        shell: bash

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5

      - name: Build
        shell: bash
        run: |
          dotnet tool restore
          dotnet cake

  format:
    name: Format
    if: "!contains(github.event.head_commit.message, 'skip-ci')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5

      - name: Restore
        shell: bash
        run: dotnet restore ./src/Willow.sln

      - name: Verify formatting
        shell: bash
        run: dotnet format ./src/Willow.sln --verify-no-changes --no-restore --severity error

  willow:
    name: Willow self-check
    if: "!contains(github.event.head_commit.message, 'skip-ci')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5

      - name: Run Willow on its own solution
        shell: bash
        run: dotnet run --project ./src/Willow/Willow.csproj -c Release -- ./src/Willow.sln --tfm net10.0 --strict
